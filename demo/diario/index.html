<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informe Diario — Demo AgroScope</title>
  <meta name="description" content="Demo interactiva del informe diario de AgroScope: analisis completo de un dia de cobertura mediatica agro con inteligencia artificial.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Informe Diario — AgroScope Demo">
  <meta property="og:description" content="Analisis completo de un dia de cobertura mediatica agro.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../demo-styles.css">
</head>
<body>

  <!-- TOP BAR -->
  <header class="demo-topbar">
    <div class="container demo-topbar-inner">
      <a href="../../index.html" class="logo">
        <span class="logo-agro">Agro</span><span class="logo-scope">Scope</span>
      </a>
      <div class="topbar-center">
        <span class="badge badge-diario">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Informe Diario
        </span>
      </div>
      <a href="../" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Volver a demos
      </a>
    </div>
  </header>

  <!-- DASHBOARD AREA -->
  <main>
    <div class="demo-embed">
      <iframe id="demo-iframe" src="./dashboard.html" title="Informe Diario AgroScope" loading="lazy" scrolling="no" style="width:100%;border:none;"></iframe>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="demo-footer">
    <div class="container">
      <p><strong><span class="logo-agro">Agro</span><span class="logo-scope">Scope</span> Intelligence</strong> — Inteligencia estrategica para el agro &nbsp;|&nbsp; <a href="mailto:info@agroscope.com.ar">Contacto</a></p>
    </div>
  </footer>

  <!-- Iframe auto-resize: listen for postMessage from dashboard.html and adjust iframe height -->
  <script>
    (function () {
      var iframe = document.getElementById('demo-iframe');
      if (!iframe) return;
      var receivedHeight = false;

      window.addEventListener('message', function (event) {
        var data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'agroscope-resize' && typeof data.height === 'number' && data.height > 0) {
          iframe.style.height = data.height + 'px';
          receivedHeight = true;
        }
      }, false);

      // Fallback: if no resize message arrives within 3s, apply a sensible min-height
      setTimeout(function () {
        if (!receivedHeight) {
          iframe.style.minHeight = '80vh';
        }
      }, 3000);
    })();
  </script>

</body>
</html>
